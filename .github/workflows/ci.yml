name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (existing-code warnings allowed)
        run: npm run lint -- --max-warnings 9999

      - name: Unit tests
        run: npm run test:run

      - name: E2E harness smoke
        run: npm run test:e2e
