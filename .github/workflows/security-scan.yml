# GluMira™ Security Scan Workflow
# Version: 7.0.0
#
# Runs:
#   - Weekly on Monday at 08:00 UTC
#   - On push to main/develop
#   - On pull requests touching package files
#
# Required secrets:
#   SNYK_TOKEN   — Snyk vulnerability scan

name: Security Scan

on:
  schedule:
    - cron: "0 8 * * 1"   # Weekly Monday 08:00 UTC
  push:
    branches: [main, develop]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "server/**"
      - ".github/workflows/security-scan.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # ── Dependency Audit ────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high severity)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Snyk test
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  # ── Secret Scanning ─────────────────────────────────────────
  secret-scan:
    name: Secret / Credential Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for secret scanning

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  # ── SAST (Static Analysis) ──────────────────────────────────
  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── GDPR / PHI Compliance Check ─────────────────────────────
  compliance-check:
    name: GDPR / PHI Compliance Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Check for console.log statements that might leak PHI
      - name: Check for PHI leaks in console.log
        run: |
          echo "Scanning for potential PHI leaks in console.log..."
          FOUND=$(grep -rn "console\.log.*\(patient\|glucose\|insulin\|dose\|phi\)" \
            --include="*.ts" --include="*.tsx" \
            server/ client/src/ \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            || true)
          if [ -n "$FOUND" ]; then
            echo "⚠️  Potential PHI in console.log found:"
            echo "$FOUND"
            echo "Review and replace with structured logger."
          else
            echo "✅ No PHI leaks in console.log detected."
          fi
        continue-on-error: true

      # Verify DISCLAIMER is present in all server modules
      - name: Check DISCLAIMER in server modules
        run: |
          echo "Checking DISCLAIMER presence in server modules..."
          MISSING=$(find server/ -name "*.ts" -not -name "*.test.ts" -not -path "*/_core/*" \
            -not -path "*/node_modules/*" | \
            xargs grep -rL "DISCLAIMER" 2>/dev/null || true)
          if [ -n "$MISSING" ]; then
            echo "⚠️  Missing DISCLAIMER in:"
            echo "$MISSING"
          else
            echo "✅ DISCLAIMER present in all server modules."
          fi
        continue-on-error: true
