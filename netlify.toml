# GluMira™ Platform — Netlify Configuration
# Deploys the client SPA from glumira-platform-main

[build]
  base = "glumira-platform-main/glumira-platform-main"
  command = "pnpm install && pnpm vite build"
  publish = "glumira-platform-main/glumira-platform-main/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA fallback — redirect all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy — route /api/* to your backend (update URL when backend is deployed)
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url.com/api/:splat"
#   status = 200
#   force = true

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
