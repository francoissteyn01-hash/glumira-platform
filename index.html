<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GluMira™ — The Science of Insulin, Made Visible</title>
    <meta name="description" content="GluMira™ is an educational insulin analytics platform powered by IOB Hunter™. Visualise insulin activity, stacking, and overlap risk. Free for caregivers of children with Type 1 Diabetes." />
    <meta name="keywords" content="diabetes, insulin, IOB, insulin on board, Type 1 Diabetes, T1D, caregiver, glucose, insulin stacking, IOB Hunter" />
    <meta property="og:title" content="GluMira™ — The Science of Insulin, Made Visible" />
    <meta property="og:description" content="See what insulin is doing between injections. Educational platform for caregivers, patients, and clinicians." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://glumira.ai" />
    <meta property="og:image" content="https://glumira.ai/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://glumira.ai" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <script>
      // Prevent flash of wrong theme before React hydration
      // Default: light (Scandinavian Minimalist). Dark only if user explicitly chose it.
      (function() {
        try {
          var theme = localStorage.getItem('glumira-theme') || 'light';
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
